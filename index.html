function renderTodo() {
  const active = DATA.todo.filter(t => !t.done);
  const done = DATA.todo.filter(t => t.done);
  
  document.getElementById('todoSummary').innerHTML = 
    `<span style="color: var(--purple); font-weight: 700;">${active.length}</span> active tasks · <span style="color: var(--green); font-weight: 700;">${done.length}</span> completed`;
  
  const groups = {};
  active.forEach(t => {
    if (!groups[t.group]) groups[t.group] = [];
    groups[t.group].push(t);
  });
  
  const groupOrder = ['Blockers', 'Active', 'Bugs', 'Pipeline', 'Improvements'];
  const groupColors = {
    'Blockers': 'badge-red',
    'Active': 'badge-yellow', 
    'Bugs': 'badge-orange',
    'Pipeline': 'badge-blue',
    'Improvements': 'badge-gray'
  };
  
  const priorityColors = {
    'P0': 'badge-red',
    'P1': 'badge-orange', 
    'P2': 'badge-blue'
  };
  
  let html = '';
  
  // Active groups
  groupOrder.forEach(g => {
    if (!groups[g]) return;
    html += `<div class="todo-group">
      <div class="todo-group-header">${esc(g)} <span class="badge ${groupColors[g] || 'badge-gray'}" style="font-size:11px;margin-left:6px">${groups[g].length}</span></div>`;
    
    groups[g].forEach(t => {
      html += `<div class="todo-item" data-id="${t.id}">
        <div class="todo-content" style="flex:1">
          <div class="todo-text">${esc(t.title)}</div>
          <div class="todo-desc">${esc(t.description)}</div>
          ${t.context ? '<div style="font-size:11px;color:#666;margin-top:4px;font-family:monospace;word-break:break-all">📎 ' + esc(t.context) + '</div>' : ''}
        </div>
        <div class="todo-badges">
          <span class="badge ${priorityColors[t.priority] || 'badge-gray'}">${esc(t.priority)}</span>
        </div>
      </div>`;
    });
    
    html += '</div>';
  });
  
  // Done section
  if (done.length > 0) {
    html += '<div class="todo-group" style="opacity:0.6"><div class="todo-group-header">Done <span class="badge badge-green" style="font-size:11px;margin-left:6px">' + done.length + '</span></div>';
    done.sort((a, b) => (b.done_at || '').localeCompare(a.done_at || ''));
    done.forEach(t => {
      const doneDate = t.done_at ? new Date(t.done_at).toLocaleDateString('en-US', {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'}) : '';
      html += '<div class="todo-item" style="text-decoration:line-through;opacity:0.7" data-id="' + t.id + '">' +
        '<div class="todo-content" style="flex:1">' +
          '<div class="todo-text">' + esc(t.title) + '</div>' +
          (doneDate ? '<div style="font-size:11px;color:#4ade80">✓ ' + doneDate + '</div>' : '') +
        '</div></div>';
    });
    html += '</div>';
  }
  
  document.getElementById('todoGroups').innerHTML = html;
  updateTodoBadge();
}

/* ===== NAVIGATION ===== */
function setupNav() {
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => switchTab(item.dataset.tab));
  });
  // Hamburger
  
  document.getElementById('sidebarOverlay').addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  });
}

function switchTab(tab) {
  // Nav items
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[data-tab="${tab}"]`)?.classList.add('active');
  // Tab content
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  const el = document.getElementById(`tab-${tab}`);
  if (el) el.classList.add('active');
  // Hash
  history.replaceState(null, '', `#${tab}`);
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function setupHash() {
  const hash = location.hash.replace('#', '') || 'pages';
  switchTab(hash);
  window.addEventListener('hashchange', () => {
    switchTab(location.hash.replace('#', '') || 'pages');
  });
}

/* ===== PAGE IMAGE REVIEWS ===== */
function renderPageImageReview() {
  const imgs = DATA.image_review || [];
  if (imgs.length === 0) {
    document.getElementById('pageReviewSubtitle').textContent = 'No images to review';
    document.getElementById('pageReviewContent').innerHTML = '<div class="review-all-done"><span class="emoji">📭</span>No page image data</div>';
    return;
  }

  const reviewed = imgs.filter(img => pageReviewData[img.id] && pageReviewData[img.id].decision).length;
  const total = imgs.length;
  const pct = total > 0 ? Math.round((reviewed / total) * 100) : 0;
  document.getElementById('pageReviewSubtitle').textContent = (total - reviewed) + ' images awaiting review';
  document.getElementById('pageReviewProgressText').innerHTML = '<strong>' + reviewed + '</strong> of <strong>' + total + '</strong> reviewed';
  document.getElementById('pageReviewProgressFill').style.width = pct + '%';

  const unreviewed = imgs.filter(img => !(pageReviewData[img.id] && pageReviewData[img.id].decision));
  if (unreviewed.length === 0) {
    document.getElementById('pageReviewContent').innerHTML = '<div class="review-all-done"><span class="emoji">🎉</span>All page images reviewed!</div>';
    updatePageReviewBadge();
    return;
  }

  const batchStart = pageReviewBatch * 3;
  const batch = unreviewed.slice(batchStart, batchStart + 3);
  if (batch.length === 0 && batchStart > 0) { pageReviewBatch = 0; renderPageImageReview(); return; }

  const catColors = { pdp: 'badge-purple', top5: 'badge-blue', '7reasons': 'badge-green', creative: 'badge-orange', news: 'badge-yellow' };

  let html = '<div class="review-batch-grid">';
  batch.forEach(img => {
    const existing = pageReviewData[img.id] || {};
    html += '<div class="review-batch-card">' +
      '<div class="review-img-wrap"><img src="' + esc(img.cdn_url) + '" loading="lazy" alt="' + esc(img.name) + '" onclick="openLightbox(this.src)" /></div>' +
      '<div class="review-card-body">' +
        '<div class="review-card-title">' + esc(img.name) + '</div>' +
        '<span class="badge ' + (catColors[img.category] || 'badge-gray') + '">' + esc(img.category) + '</span>' +
        '<div class="review-actions">' +
          '<button class="review-btn review-btn-approve' + (existing.decision === 'approved' ? ' active' : '') + '" onclick="pageReviewDecide(' + img.id + ',&quot;approved&quot;)">✅ Approve</button>' +
          '<button class="review-btn review-btn-reject' + (existing.decision === 'rejected' ? ' active' : '') + '" onclick="pageReviewDecide(' + img.id + ',&quot;rejected&quot;)">❌ Reject</button>' +
        '</div>' +
        '<textarea class="review-comment" placeholder="Why is this good/bad?" onchange="pageReviewComment(' + img.id + ',this.value)">' + esc(existing.comment || '') + '</textarea>' +
      '</div></div>';
  });
  html += '</div>';

  const allDecided = batch.every(img => pageReviewData[img.id] && pageReviewData[img.id].decision);
  const remaining = unreviewed.length - batch.length;
  html += '<div class="review-batch-nav">' +
    '<button class="review-nav-btn" onclick="pageReviewBatch++;renderPageImageReview()" ' + (allDecided && remaining > 0 ? '' : 'disabled') + '>' +
    (allDecided && remaining > 0 ? 'Next Batch → (' + remaining + ' remaining)' : 'Make all decisions to continue') +
    '</button></div>';

  document.getElementById('pageReviewContent').innerHTML = html;
  updatePageReviewBadge();
}

function pageReviewDecide(id, decision) {
  if (!pageReviewData[id]) pageReviewData[id] = {};
  pageReviewData[id].decision = decision;
  localStorage.setItem(PAGE_REVIEW_KEY, JSON.stringify(pageReviewData));
  renderPageImageReview();
}

function pageReviewComment(id, comment) {
  if (!pageReviewData[id]) pageReviewData[id] = {};
  pageReviewData[id].comment = comment;
  localStorage.setItem(PAGE_REVIEW_KEY, JSON.stringify(pageReviewData));
}

function updatePageReviewBadge() {
  const imgs = DATA.image_review || [];
  const remaining = imgs.filter(img => !(pageReviewData[img.id] && pageReviewData[img.id].decision)).length;
  document.getElementById('navBadgePageReview').textContent = remaining;
}

/* ===== AD IMAGE REVIEWS ===== */
function renderAdImageReview() {
  if (!DATA || !DATA.ads || DATA.ads.length === 0) {
    document.getElementById('adImageReviewSubtitle').textContent = 'No ads to review';
    document.getElementById('adImageReviewContent').innerHTML = '<div class="review-all-done"><span class="emoji">📭</span>No ad data</div>';
    return;
  }

  const total = DATA.ads.length;
  const reviewed = DATA.ads.filter(a => {
    const d = adImageReviewData[a.id];
    return d && d.image && d.copy;
  }).length;
  const pct = total > 0 ? Math.round((reviewed / total) * 100) : 0;
  document.getElementById('adImageReviewSubtitle').textContent = (total - reviewed) + ' ads awaiting review';
  document.getElementById('adImageReviewProgressText').innerHTML = '<strong>' + reviewed + '</strong> of <strong>' + total + '</strong> reviewed';
  document.getElementById('adImageReviewProgressFill').style.width = pct + '%';

  const unreviewed = DATA.ads.filter(a => { const d = adImageReviewData[a.id]; return !(d && d.image && d.copy); });
  if (unreviewed.length === 0) {
    document.getElementById('adImageReviewContent').innerHTML = '<div class="review-all-done"><span class="emoji">🎉</span>All ads reviewed!<br><button class="review-nav-btn" style="margin-top:16px;background:#16a34a;color:#fff;font-size:16px;padding:12px 32px;border:none;border-radius:8px;cursor:pointer" onclick="submitAdReviews()">📤 Submit Reviews to Bot</button><div id="submitStatus" style="margin-top:8px;font-size:13px;color:#888"></div></div>';
    updateAdImageReviewBadge();
    return;
  }

  const destUrlMap = {};
  DATA.pages.forEach(p => { destUrlMap[p.name] = p.live_url; });
  const campColors = { Mechanism: 'badge-purple', Ranking: 'badge-blue', Authority: 'badge-green', Retargeting: 'badge-orange', 'Batch 3': 'badge-purple', 'Type 1 — Confession': 'badge-purple', 'Type 2 — Family': 'badge-blue', 'Type 3 — Anatomy': 'badge-green', 'Type 4 — B&A': 'badge-orange', 'Type 5 — Nested': 'badge-purple', 'Type 6 — Community': 'badge-blue' };

  let html = '<div class="review-batch-grid">';
  unreviewed.forEach(ad => {
    const existing = adImageReviewData[ad.id] || {};
    const destUrl = destUrlMap[ad.destination] || '#';

    html += '<div class="review-batch-card ad-review-stack">' +
      '<div class="ad-review-image-section">' +
        '<div class="ad-review-label">AD CREATIVE</div>' +
        (ad.image_url ? '<div class="review-img-wrap" onclick="togglePromptOverlay(this)"><img src="' + esc(ad.image_url) + '" loading="lazy" alt="' + esc(ad.angle) + '" /><div class="prompt-overlay"><span class="prompt-overlay-label">GENERATION PROMPT (click to close)</span>' + esc(ad.prompt || 'No prompt recorded') + '</div></div>' : '<div class="review-img-placeholder">No image</div>') +
        '<div class="review-actions">' +
          '<button class="review-btn review-btn-approve' + (existing.image === 'approved' ? ' active' : '') + '" onclick="adImageDecide(&quot;' + ad.id + '&quot;,&quot;image&quot;,&quot;approved&quot;)">Image ✅</button>' +
          '<button class="review-btn review-btn-reject' + (existing.image === 'rejected' ? ' active' : '') + '" onclick="adImageDecide(&quot;' + ad.id + '&quot;,&quot;image&quot;,&quot;rejected&quot;)">Image ❌</button>' +
        '</div>' +
        '<div class="rating-sliders">' +
          '<div class="rating-slider-group"><label>Realism</label><input type="range" min="1" max="5" value="' + (existing.score_realism || 3) + '" oninput="adImageScore(&quot;' + ad.id + '&quot;,&quot;score_realism&quot;,this.value);this.nextElementSibling.textContent=this.value"><span class="rating-val">' + (existing.score_realism || 3) + '</span></div>' +
          '<div class="rating-slider-group"><label>Scroll-Stop</label><input type="range" min="1" max="5" value="' + (existing.score_scroll_stop || 3) + '" oninput="adImageScore(&quot;' + ad.id + '&quot;,&quot;score_scroll_stop&quot;,this.value);this.nextElementSibling.textContent=this.value"><span class="rating-val">' + (existing.score_scroll_stop || 3) + '</span></div>' +
          '<div class="rating-slider-group"><label>Emotion</label><input type="range" min="1" max="5" value="' + (existing.score_emotion || 3) + '" oninput="adImageScore(&quot;' + ad.id + '&quot;,&quot;score_emotion&quot;,this.value);this.nextElementSibling.textContent=this.value"><span class="rating-val">' + (existing.score_emotion || 3) + '</span></div>' +
          '<div class="rating-slider-group"><label>UGC Feel</label><input type="range" min="1" max="5" value="' + (existing.score_ugc || 3) + '" oninput="adImageScore(&quot;' + ad.id + '&quot;,&quot;score_ugc&quot;,this.value);this.nextElementSibling.textContent=this.value"><span class="rating-val">' + (existing.score_ugc || 3) + '</span></div>' +
        '</div>' +
        '<textarea class="review-comment" placeholder="Image feedback..." onchange="adImageComment(&quot;' + ad.id + '&quot;,&quot;image_comment&quot;,this.value)">' + esc(existing.image_comment || '') + '</textarea>' +
      '</div>' +
      '<div class="ad-review-copy-section">' +
        '<div class="ad-review-label">AD COPY</div>' +
        '<div class="ad-review-meta">' +
          '<span class="badge ' + (campColors[ad.campaign] || 'badge-gray') + '">' + esc(ad.campaign) + '</span>' +
          '<span class="ad-number">Ad #' + ad.id + '</span>' +
          (ad.hook_type ? '<span class="badge badge-gray">' + esc(ad.hook_type) + '</span>' : '') +
          '<div style="font-size:11px;color:#888;margin-top:4px">→ <a href="' + esc(destUrl) + '" target="_blank" style="color:var(--purple)">' + esc(ad.destination) + '</a></div>' +
        '</div>' +
        '<div class="ad-review-hook">' + esc(ad.hook) + '</div>' +
        '<div class="ad-review-body">' + esc(ad.body).substring(0, 300) + (ad.body.length > 300 ? '...' : '') + '</div>' +
        '<div class="review-actions">' +
          '<button class="review-btn review-btn-approve' + (existing.copy === 'approved' ? ' active' : '') + '" onclick="adImageDecide(&quot;' + ad.id + '&quot;,&quot;copy&quot;,&quot;approved&quot;)">Copy ✅</button>' +
          '<button class="review-btn review-btn-reject' + (existing.copy === 'rejected' ? ' active' : '') + '" onclick="adImageDecide(&quot;' + ad.id + '&quot;,&quot;copy&quot;,&quot;rejected&quot;)">Copy ❌</button>' +
        '</div>' +
        '<textarea class="review-comment" placeholder="Copy feedback..." onchange="adImageComment(&quot;' + ad.id + '&quot;,&quot;copy_comment&quot;,this.value)">' + esc(existing.copy_comment || '') + '</textarea>' +
      '</div>' +
    '</div>';
  });
  html += '</div>';

  document.getElementById('adImageReviewContent').innerHTML = html;
  updateAdImageReviewBadge();
}


function togglePromptOverlay(wrapEl) {
  const overlay = wrapEl.querySelector('.prompt-overlay');
  if (overlay) {
    overlay.classList.toggle('visible');
  }
}
function adImageDecide(id, field, decision) {
  if (!adImageReviewData[id]) adImageReviewData[id] = {};
  adImageReviewData[id][field] = decision;
  localStorage.setItem(AD_IMAGE_REVIEW_KEY, JSON.stringify(adImageReviewData));
  renderAdImageReview();
}


function adImageScore(id, field, value) {
  if (!adImageReviewData[id]) adImageReviewData[id] = {};
  adImageReviewData[id][field] = parseInt(value);
  localStorage.setItem(AD_IMAGE_REVIEW_KEY, JSON.stringify(adImageReviewData));
}
function adImageComment(id, field, comment) {
  if (!adImageReviewData[id]) adImageReviewData[id] = {};
  adImageReviewData[id][field] = comment;
  localStorage.setItem(AD_IMAGE_REVIEW_KEY, JSON.stringify(adImageReviewData));
}

function updateAdImageReviewBadge() {
  const remaining = DATA.ads.filter(a => { const d = adImageReviewData[a.id]; return !(d && d.image && d.copy); }).length;
  document.getElementById('navBadgeAdReview').textContent = remaining;
}


function submitAdReviews() {
  const statusEl = document.getElementById('submitStatus');
  
  // Build structured review data
  const reviews = DATA.ads.map(ad => {
    const d = adImageReviewData[ad.id] || {};
    return {
      ad_id: ad.id,
      filename: ad.image_url ? ad.image_url.split('/').pop() : null,
      campaign: ad.campaign,
      angle: ad.angle,
      hook_type: ad.hook_type,
      hook: ad.hook,
      body: ad.body,
      image_url: ad.image_url,
      image_decision: d.image || null,
      image_comment: d.image_comment || '',
      copy_decision: d.copy || null,
      copy_comment: d.copy_comment || '',
      scores: {
        realism: d.score_realism || null,
        scroll_stop: d.score_scroll_stop || null,
        emotion: d.score_emotion || null,
        ugc_quality: d.score_ugc || null
      },
      reviewed_at: new Date().toISOString()
    };
  });
  
  const avgScore = (field) => {
      const vals = reviews.map(r => r.scores[field]).filter(v => v !== null);
      return vals.length > 0 ? (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(1) : null;
    };
    const payload = {
    batch: 'mechanism-2026-03-18',
    submitted_at: new Date().toISOString(),
    total: reviews.length,
    approved_images: reviews.filter(r => r.image_decision === 'approved').length,
    rejected_images: reviews.filter(r => r.image_decision === 'rejected').length,
    avg_scores: {
      realism: avgScore('realism'),
      scroll_stop: avgScore('scroll_stop'),
      emotion: avgScore('emotion'),
      ugc_quality: avgScore('ugc_quality')
    },
    reviews: reviews
  };
  
  // Download JSON file
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ad-reviews-mechanism-' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
  
  statusEl.innerHTML = '✅ Reviews downloaded! Bot will auto-detect and process.';
}
</script>
