<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuxeBeam Ops — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0a0a0a;
  color: #e4e4e7;
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
}

/* ===== VARIABLES ===== */
:root {
  --purple: #7c3aed;
  --purple-dim: rgba(124, 58, 237, 0.15);
  --purple-glow: rgba(124, 58, 237, 0.3);
  --blue: #3b82f6;
  --blue-dim: rgba(59, 130, 246, 0.15);
  --green: #22c55e;
  --green-dim: rgba(34, 197, 94, 0.15);
  --yellow: #eab308;
  --yellow-dim: rgba(234, 179, 8, 0.15);
  --orange: #f97316;
  --orange-dim: rgba(249, 115, 22, 0.15);
  --red: #ef4444;
  --red-dim: rgba(239, 68, 68, 0.15);
  --gray: #71717a;
  --card-bg: #111113;
  --card-border: #1e1e1e;
  --card-hover: #1a1a1d;
  --sidebar-w: 260px;
  --muted: #71717a;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-w);
  height: 100vh;
  overflow-y: auto;
  background: #111113;
  border-right: 1px solid var(--card-border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 100;
  transition: transform 0.3s ease;
}
.sidebar-logo {
  padding: 24px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--card-border);
}
.logo-icon {
  width: 40px;
  height: 40px;
  background: var(--purple);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 14px;
  color: #fff;
  flex-shrink: 0;
}
.logo-text {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
}
.sidebar-nav {
  flex: 1;
  padding: 12px 0;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  cursor: pointer;
  transition: all 0.2s;
  border-left: 3px solid transparent;
  font-size: 15px;
  font-weight: 500;
  color: var(--muted);
}
.nav-item:hover {
  background: rgba(255,255,255,0.03);
  color: #e4e4e7;
}
.nav-item.active {
  border-left-color: var(--purple);
  background: var(--purple-dim);
  color: #fff;
}
.nav-item .icon { font-size: 18px; width: 24px; text-align: center; }
.nav-badge {
  margin-left: auto;
  background: rgba(255,255,255,0.08);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
}
.nav-item.active .nav-badge {
  background: var(--purple-glow);
  color: #c4b5fd;
}
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--card-border);
  font-size: 12px;
  color: #52525b;
}

/* ===== HAMBURGER (mobile) ===== */
.hamburger {
  display: none;
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 200;
  width: 44px;
  height: 44px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: #fff;
}
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 90;
}

/* ===== MAIN CONTENT ===== */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
  padding: 32px 40px;
}

/* ===== LOADING / ERROR ===== */
.loading-screen, .error-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  flex-direction: column;
  gap: 16px;
}
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--card-border);
  border-top-color: var(--purple);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-screen { color: var(--red); }
.error-screen .error-msg { color: var(--muted); font-size: 14px; }

/* ===== TAB CONTENT ===== */
.tab-content { display: none; animation: fadeIn 0.3s ease; }
.tab-content.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ===== SECTION HEADERS ===== */
.section-header {
  margin-bottom: 24px;
}
.section-title {
  font-size: 28px;
  font-weight: 800;
  color: #fff;
  margin-bottom: 4px;
}
.section-subtitle {
  font-size: 15px;
  color: var(--muted);
}

/* ===== BADGES ===== */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}
.badge-purple { background: var(--purple-dim); color: #c4b5fd; }
.badge-blue { background: var(--blue-dim); color: #93c5fd; }
.badge-green { background: var(--green-dim); color: #86efac; }
.badge-yellow { background: var(--yellow-dim); color: #fde047; }
.badge-orange { background: var(--orange-dim); color: #fdba74; }
.badge-red { background: var(--red-dim); color: #fca5a5; }
.badge-gray { background: rgba(113,113,122,0.15); color: #a1a1aa; }

/* ===== CARDS ===== */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: 24px;
  transition: all 0.2s;
}
.card:hover {
  background: var(--card-hover);
  border-color: #2a2a2e;
}

/* ===== PAGES TAB ===== */
.pages-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}
.page-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.page-name {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  line-height: 1.3;
}
.page-badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.page-meta {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 16px;
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.page-buttons {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.2s;
  cursor: pointer;
  border: none;
  font-family: inherit;
}
.btn-primary {
  background: var(--purple);
  color: #fff;
}
.btn-primary:hover { background: #6d28d9; }
.btn-secondary {
  background: rgba(255,255,255,0.06);
  color: #d4d4d8;
  border: 1px solid var(--card-border);
}
.btn-secondary:hover { background: rgba(255,255,255,0.1); }
.btn-sm {
  padding: 6px 12px;
  font-size: 12px;
  border-radius: 8px;
}
.issues-list {
  list-style: none;
}
.issues-list li {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 14px;
  color: #d4d4d8;
  padding: 4px 0;
  line-height: 1.5;
}
.issues-list li::before {
  content: '';
  width: 7px;
  height: 7px;
  background: var(--red);
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 7px;
}
.no-issues {
  font-size: 14px;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ===== ADS TAB ===== */
.filter-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.filter-tab {
  padding: 8px 16px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  background: rgba(255,255,255,0.04);
  color: var(--muted);
  border: 1px solid transparent;
  transition: all 0.2s;
  font-family: inherit;
}
.filter-tab:hover { color: #e4e4e7; background: rgba(255,255,255,0.08); }
.filter-tab.active {
  background: var(--purple-dim);
  color: #c4b5fd;
  border-color: rgba(124, 58, 237, 0.3);
}
.ads-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.ad-card-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.ad-number {
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
}
.ad-image {
  margin: 12px 0;
  border-radius: 8px;
  overflow: hidden;
}
.ad-image img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  border-radius: 8px;
}
.ad-hook {
  font-size: 21px;
  font-weight: 700;
  color: #fff;
  line-height: 1.35;
  margin-bottom: 8px;
}
.ad-angle {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 12px;
}
.ad-destination {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 14px;
}
.ad-destination a {
  color: var(--purple);
  text-decoration: none;
}
.ad-destination a:hover { text-decoration: underline; }
.ad-expand-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: 1px solid var(--card-border);
  padding: 8px 14px;
  border-radius: 8px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.ad-expand-toggle:hover { color: #e4e4e7; border-color: #333; }
.ad-body-wrap {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}
.ad-body-wrap.expanded {
  max-height: 2000px;
}
.ad-body {
  margin-top: 14px;
  padding: 20px;
  background: rgba(0,0,0,0.3);
  border-radius: 10px;
  border: 1px solid var(--card-border);
  white-space: pre-wrap;
  font-size: 14px;
  line-height: 1.7;
  color: #d4d4d8;
  position: relative;
}
.copy-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--card-border);
  color: var(--muted);
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.copy-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.copy-btn.copied { color: var(--green); border-color: var(--green); }

/* ===== IMAGES TAB ===== */
.images-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.image-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  overflow: hidden;
  transition: all 0.2s;
  cursor: pointer;
}
.image-card:hover {
  border-color: #2a2a2e;
  transform: translateY(-2px);
}
.image-thumb {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: block;
  background: #1a1a1d;
}
.image-info {
  padding: 14px 16px;
}
.image-name {
  font-size: 14px;
  font-weight: 600;
  color: #e4e4e7;
  margin-bottom: 8px;
  line-height: 1.4;
}
.image-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

/* ===== LIGHTBOX ===== */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 300;
  align-items: center;
  justify-content: center;
  padding: 40px;
}
.lightbox.active { display: flex; }
.lightbox img {
  max-width: 90vw;
  max-height: 85vh;
  border-radius: 12px;
  object-fit: contain;
}
.lightbox-close {
  position: absolute;
  top: 20px;
  right: 24px;
  width: 44px;
  height: 44px;
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: 50%;
  color: #fff;
  font-size: 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.lightbox-close:hover { background: rgba(255,255,255,0.2); }

/* ===== TODO TAB ===== */
.todo-summary {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 24px;
}
.todo-summary strong { color: #fff; }
.todo-group {
  margin-bottom: 28px;
}
.todo-group-header {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--card-border);
}
.todo-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  margin-bottom: 8px;
  transition: all 0.2s;
}
.todo-item:hover { background: var(--card-hover); }
.todo-checkbox {
  width: 22px;
  height: 22px;
  border: 2px solid #3f3f46;
  border-radius: 6px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  margin-top: 2px;
}
.todo-checkbox:hover { border-color: var(--purple); }
.todo-checkbox.checked {
  background: var(--purple);
  border-color: var(--purple);
}
.todo-checkbox.checked::after {
  content: '✓';
  color: #fff;
  font-size: 13px;
  font-weight: 700;
}
.todo-item.done .todo-text { text-decoration: line-through; color: var(--muted); }
.todo-content { flex: 1; min-width: 0; }
.todo-text {
  font-size: 15px;
  font-weight: 500;
  color: #e4e4e7;
  margin-bottom: 4px;
  transition: all 0.2s;
}
.todo-desc {
  font-size: 13px;
  color: #52525b;
  line-height: 1.5;
}
.todo-badges {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
  flex-wrap: wrap;
}

/* ===== MOBILE ===== */
@media (max-width: 1024px) {
  .pages-grid { grid-template-columns: 1fr; }
  .images-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .hamburger { display: flex; }
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }
  .main { margin-left: 0; padding: 24px 16px; padding-top: 72px; }
  .pages-grid { grid-template-columns: 1fr; }
  .images-grid { grid-template-columns: 1fr; }
  .section-title { font-size: 24px; }
  .ad-hook { font-size: 18px; }
}

/* ===== PULSING ANIMATION ===== */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.badge-pulse { animation: pulse 2s ease-in-out infinite; }


/* ===== AD REVIEW STACKED CARDS ===== */
.ad-review-stack {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.ad-review-image-section,
.ad-review-copy-section {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.ad-review-copy-section { border-bottom: none; }
.ad-review-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 8px;
  text-transform: uppercase;
}
.ad-review-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  margin-bottom: 8px;
}
.ad-review-hook {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.4;
}
.ad-review-body {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
  margin-bottom: 12px;
  max-height: 120px;
  overflow-y: auto;
}
.review-img-placeholder {
  width: 100%;
  height: 160px;
  background: #111;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 12px;
}

/* ===== REVIEW CARDS - PROPER STYLING ===== */
.review-batch-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin: 16px 0;
}

.review-batch-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.review-img-wrap {
  width: 100%;
  aspect-ratio: 1;
  overflow: hidden;
  background: #111;
  border-radius: 8px;
  margin-bottom: 12px;
}

.review-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

.review-card-body {
  padding: 12px 16px 16px;
}

.review-card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  word-break: break-word;
}

/* ===== REVIEW BUTTONS ===== */
.review-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s ease;
  -webkit-tap-highlight-color: transparent;
  min-height: 44px;
}

.review-btn:hover {
  border-color: #444;
}

.review-btn.approve.active {
  background: rgba(34, 197, 94, 0.15);
  border-color: #22c55e;
  color: #22c55e;
}

.review-btn.reject.active {
  background: rgba(239, 68, 68, 0.15);
  border-color: #ef4444;
  color: #ef4444;
}

.review-actions {
  display: flex;
  gap: 8px;
  margin: 10px 0;
  flex-wrap: wrap;
}

/* ===== REVIEW COMMENT TEXTAREA ===== */
.review-comment {
  width: 100%;
  min-height: 60px;
  padding: 10px 12px;
  background: #111;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  resize: vertical;
  box-sizing: border-box;
}

.review-comment::placeholder {
  color: #555;
}

.review-comment:focus {
  outline: none;
  border-color: var(--purple);
}

/* ===== BATCH NAV ===== */
.review-batch-nav {
  text-align: center;
  margin: 20px 0;
}

.review-nav-btn {
  padding: 12px 24px;
  background: var(--purple);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  min-height: 44px;
}

.review-nav-btn:disabled {
  background: #333;
  color: #666;
  cursor: not-allowed;
}

.review-all-done {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}

.review-all-done .emoji {
  font-size: 48px;
  display: block;
  margin-bottom: 12px;
}

/* ===== PROGRESS BAR ===== */
.review-progress-bar-wrap {
  margin: 12px 0 20px;
}

.review-progress-text {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 6px;
}

.review-progress-bar {
  height: 4px;
  background: #222;
  border-radius: 2px;
  overflow: hidden;
}

.review-progress-fill {
  height: 100%;
  background: var(--purple);
  border-radius: 2px;
  transition: width 0.3s ease;
}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px) {
  .review-batch-grid {
    grid-template-columns: 1fr !important;
    gap: 12px;
  }
  
  .review-btn {
    flex: 1;
    justify-content: center;
    padding: 12px 8px;
    font-size: 15px;
    min-height: 48px;
  }
  
  .review-comment {
    font-size: 16px; /* prevents iOS zoom on focus */

function renderTodo() {
  const active = DATA.todo.filter(t => !t.done);
  const done = DATA.todo.filter(t => t.done);
  
  document.getElementById('todoSummary').innerHTML = 
    `<span style="color: var(--purple); font-weight: 700;">${active.length}</span> active tasks · <span style="color: var(--green); font-weight: 700;">${done.length}</span> completed`;
  
  const groups = {};
  active.forEach(t => {
    if (!groups[t.group]) groups[t.group] = [];
    groups[t.group].push(t);
  });
  
  const groupOrder = ['Blockers', 'Active', 'Bugs', 'Pipeline', 'Improvements'];
  const groupColors = {
    'Blockers': 'badge-red',
    'Active': 'badge-yellow', 
    'Bugs': 'badge-orange',
    'Pipeline': 'badge-blue',
    'Improvements': 'badge-gray'
  };
  
  const priorityColors = {
    'P0': 'badge-red',
    'P1': 'badge-orange', 
    'P2': 'badge-blue'
  };
  
  let html = '';
  
  // Active groups
  groupOrder.forEach(g => {
    if (!groups[g]) return;
    html += `<div class="todo-group">
      <div class="todo-group-header">${esc(g)} <span class="badge ${groupColors[g] || 'badge-gray'}" style="font-size:11px;margin-left:6px">${groups[g].length}</span></div>`;
    
    groups[g].forEach(t => {
      html += `<div class="todo-item" data-id="${t.id}">
        <div class="todo-content" style="flex:1">
          <div class="todo-text">${esc(t.title)}</div>
          <div class="todo-desc">${esc(t.description)}</div>
          ${t.context ? '<div style="font-size:11px;color:#666;margin-top:4px;font-family:monospace;word-break:break-all">📎 ' + esc(t.context) + '</div>' : ''}
        </div>
        <div class="todo-badges">
          <span class="badge ${priorityColors[t.priority] || 'badge-gray'}">${esc(t.priority)}</span>
        </div>
      </div>`;
    });
    
    html += '</div>';
  });
  
  // Done section
  if (done.length > 0) {
    html += '<div class="todo-group" style="opacity:0.6"><div class="todo-group-header">Done <span class="badge badge-green" style="font-size:11px;margin-left:6px">' + done.length + '</span></div>';
    done.sort((a, b) => (b.done_at || '').localeCompare(a.done_at || ''));
    done.forEach(t => {
      const doneDate = t.done_at ? new Date(t.done_at).toLocaleDateString('en-US', {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'}) : '';
      html += '<div class="todo-item" style="text-decoration:line-through;opacity:0.7" data-id="' + t.id + '">' +
        '<div class="todo-content" style="flex:1">' +
          '<div class="todo-text">' + esc(t.title) + '</div>' +
          (doneDate ? '<div style="font-size:11px;color:#4ade80">✓ ' + doneDate + '</div>' : '') +
        '</div></div>';
    });
    html += '</div>';
  }
  
  document.getElementById('todoGroups').innerHTML = html;
  updateTodoBadge();
}

/* ===== NAVIGATION ===== */
function setupNav() {
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => switchTab(item.dataset.tab));
  });
  // Hamburger
  
  document.getElementById('sidebarOverlay').addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  });
}

function switchTab(tab) {
  // Nav items
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[data-tab="${tab}"]`)?.classList.add('active');
  // Tab content
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  const el = document.getElementById(`tab-${tab}`);
  if (el) el.classList.add('active');
  // Hash
  history.replaceState(null, '', `#${tab}`);
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function setupHash() {
  const hash = location.hash.replace('#', '') || 'pages';
  switchTab(hash);
  window.addEventListener('hashchange', () => {
    switchTab(location.hash.replace('#', '') || 'pages');
  });
}


/* ===== AD REVIEW ===== */
function saveAdReview() {
  localStorage.setItem(AD_REVIEW_KEY, JSON.stringify(adReviewData));
}


function esc(str) {
  if (str == null) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

/* ===== PAGE IMAGE REVIEWS ===== */
function renderPageImageReview() {
  const imgs = DATA.image_review || [];
  if (imgs.length === 0) {
    document.getElementById('pageReviewSubtitle').textContent = 'No images to review';
    document.getElementById('pageReviewContent').innerHTML = '<div class="review-all-done"><span class="emoji">📭</span>No page image data</div>';
    return;
  }

  const reviewed = imgs.filter(img => pageReviewData[img.id] && pageReviewData[img.id].decision).length;
  const total = imgs.length;
  const pct = total > 0 ? Math.round((reviewed / total) * 100) : 0;
  document.getElementById('pageReviewSubtitle').textContent = (total - reviewed) + ' images awaiting review';
  document.getElementById('pageReviewProgressText').innerHTML = '<strong>' + reviewed + '</strong> of <strong>' + total + '</strong> reviewed';
  document.getElementById('pageReviewProgressFill').style.width = pct + '%';

  const unreviewed = imgs.filter(img => !(pageReviewData[img.id] && pageReviewData[img.id].decision));
  if (unreviewed.length === 0) {
    document.getElementById('pageReviewContent').innerHTML = '<div class="review-all-done"><span class="emoji">🎉</span>All page images reviewed!</div>';
    updatePageReviewBadge();
    return;
  }

  const batchStart = pageReviewBatch * 3;
  const batch = unreviewed.slice(batchStart, batchStart + 3);
  if (batch.length === 0 && batchStart > 0) { pageReviewBatch = 0; renderPageImageReview(); return; }

  const catColors = { pdp: 'badge-purple', top5: 'badge-blue', '7reasons': 'badge-green', creative: 'badge-orange', news: 'badge-yellow' };

  let html = '<div class="review-batch-grid">';
  batch.forEach(img => {
    const existing = pageReviewData[img.id] || {};
    html += '<div class="review-batch-card">' +
      '<div class="review-img-wrap"><img src="' + esc(img.cdn_url) + '" loading="lazy" alt="' + esc(img.name) + '" onclick="openLightbox(this.src)" /></div>' +
      '<div class="review-card-body">' +
        '<div class="review-card-title">' + esc(img.name) + '</div>' +
        '<span class="badge ' + (catColors[img.category] || 'badge-gray') + '">' + esc(img.category) + '</span>' +
        '<div class="review-actions">' +
          '<button class="review-btn review-btn-approve' + (existing.decision === 'approved' ? ' active' : '') + '" onclick="pageReviewDecide(' + img.id + ',&quot;approved&quot;)">✅ Approve</button>' +
          '<button class="review-btn review-btn-reject' + (existing.decision === 'rejected' ? ' active' : '') + '" onclick="pageReviewDecide(' + img.id + ',&quot;rejected&quot;)">❌ Reject</button>' +
        '</div>' +
        '<textarea class="review-comment" placeholder="Why is this good/bad?" onchange="pageReviewComment(' + img.id + ',this.value)">' + esc(existing.comment || '') + '</textarea>' +
      '</div></div>';
  });
  html += '</div>';

  const allDecided = batch.every(img => pageReviewData[img.id] && pageReviewData[img.id].decision);
  const remaining = unreviewed.length - batch.length;
  html += '<div class="review-batch-nav">' +
    '<button class="review-nav-btn" onclick="pageReviewBatch++;renderPageImageReview()" ' + (allDecided && remaining > 0 ? '' : 'disabled') + '>' +
    (allDecided && remaining > 0 ? 'Next Batch → (' + remaining + ' remaining)' : 'Make all decisions to continue') +
    '</button></div>';

  document.getElementById('pageReviewContent').innerHTML = html;
  updatePageReviewBadge();
}

function pageReviewDecide(id, decision) {
  if (!pageReviewData[id]) pageReviewData[id] = {};
  pageReviewData[id].decision = decision;
  localStorage.setItem(PAGE_REVIEW_KEY, JSON.stringify(pageReviewData));
  renderPageImageReview();
}

function pageReviewComment(id, comment) {
  if (!pageReviewData[id]) pageReviewData[id] = {};
  pageReviewData[id].comment = comment;
  localStorage.setItem(PAGE_REVIEW_KEY, JSON.stringify(pageReviewData));
}

function updatePageReviewBadge() {
  const imgs = DATA.image_review || [];
  const remaining = imgs.filter(img => !(pageReviewData[img.id] && pageReviewData[img.id].decision)).length;
  document.getElementById('navBadgePageReview').textContent = remaining;
}

/* ===== AD IMAGE REVIEWS ===== */
function renderAdImageReview() {
  if (!DATA || !DATA.ads || DATA.ads.length === 0) {
    document.getElementById('adImageReviewSubtitle').textContent = 'No ads to review';
    document.getElementById('adImageReviewContent').innerHTML = '<div class="review-all-done"><span class="emoji">📭</span>No ad data</div>';
    return;
  }

  const total = DATA.ads.length;
  const reviewed = DATA.ads.filter(a => {
    const d = adImageReviewData[a.id];
    return d && d.image && d.copy;
  }).length;
  const pct = total > 0 ? Math.round((reviewed / total) * 100) : 0;
  document.getElementById('adImageReviewSubtitle').textContent = (total - reviewed) + ' ads awaiting review';
  document.getElementById('adImageReviewProgressText').innerHTML = '<strong>' + reviewed + '</strong> of <strong>' + total + '</strong> reviewed';
  document.getElementById('adImageReviewProgressFill').style.width = pct + '%';

  const unreviewed = DATA.ads.filter(a => { const d = adImageReviewData[a.id]; return !(d && d.image && d.copy); });
  if (unreviewed.length === 0) {
    document.getElementById('adImageReviewContent').innerHTML = '<div class="review-all-done"><span class="emoji">🎉</span>All ads reviewed!<br><button class="review-nav-btn" style="margin-top:16px;background:#16a34a;color:#fff;font-size:16px;padding:12px 32px;border:none;border-radius:8px;cursor:pointer" onclick="submitAdReviews()">📤 Submit Reviews to Bot</button><div id="submitStatus" style="margin-top:8px;font-size:13px;color:#888"></div></div>';
    updateAdImageReviewBadge();
    return;
  }

  const destUrlMap = {};
  DATA.pages.forEach(p => { destUrlMap[p.name] = p.live_url; });
  const campColors = { Mechanism: 'badge-purple', Ranking: 'badge-blue', Authority: 'badge-green', Retargeting: 'badge-orange' };

  let html = '<div class="review-batch-grid">';
  unreviewed.forEach(ad => {
    const existing = adImageReviewData[ad.id] || {};
    const destUrl = destUrlMap[ad.destination] || '#';

    html += '<div class="review-batch-card ad-review-stack">' +
      '<div class="ad-review-image-section">' +
        '<div class="ad-review-label">AD CREATIVE</div>' +
        (ad.image_url ? '<div class="review-img-wrap" onclick="togglePromptOverlay(this)"><img src="' + esc(ad.image_url) + '" loading="lazy" alt="' + esc(ad.angle) + '" /><div class="prompt-overlay"><span class="prompt-overlay-label">GENERATION PROMPT (click to close)</span>' + esc(ad.prompt || 'No prompt recorded') + '</div></div>' : '<div class="review-img-placeholder">No image</div>') +
        '<div class="review-actions">' +
          '<button class="review-btn review-btn-approve' + (existing.image === 'approved' ? ' active' : '') + '" onclick="adImageDecide(&quot;' + ad.id + '&quot;,&quot;image&quot;,&quot;approved&quot;)">Image ✅</button>' +
          '<button class="review-btn review-btn-reject' + (existing.image === 'rejected' ? ' active' : '') + '" onclick="adImageDecide(&quot;' + ad.id + '&quot;,&quot;image&quot;,&quot;rejected&quot;)">Image ❌</button>' +
        '</div>' +
        '<div class="rating-sliders">' +
          '<div class="rating-slider-group"><label>Realism</label><input type="range" min="1" max="5" value="' + (existing.score_realism || 3) + '" oninput="adImageScore(&quot;' + ad.id + '&quot;,&quot;score_realism&quot;,this.value);this.nextElementSibling.textContent=this.value"><span class="rating-val">' + (existing.score_realism || 3) + '</span></div>' +
          '<div class="rating-slider-group"><label>Scroll-Stop</label><input type="range" min="1" max="5" value="' + (existing.score_scroll_stop || 3) + '" oninput="adImageScore(&quot;' + ad.id + '&quot;,&quot;score_scroll_stop&quot;,this.value);this.nextElementSibling.textContent=this.value"><span class="rating-val">' + (existing.score_scroll_stop || 3) + '</span></div>' +
          '<div class="rating-slider-group"><label>Emotion</label><input type="range" min="1" max="5" value="' + (existing.score_emotion || 3) + '" oninput="adImageScore(&quot;' + ad.id + '&quot;,&quot;score_emotion&quot;,this.value);this.nextElementSibling.textContent=this.value"><span class="rating-val">' + (existing.score_emotion || 3) + '</span></div>' +
          '<div class="rating-slider-group"><label>UGC Feel</label><input type="range" min="1" max="5" value="' + (existing.score_ugc || 3) + '" oninput="adImageScore(&quot;' + ad.id + '&quot;,&quot;score_ugc&quot;,this.value);this.nextElementSibling.textContent=this.value"><span class="rating-val">' + (existing.score_ugc || 3) + '</span></div>' +
        '</div>' +
        '<textarea class="review-comment" placeholder="Image feedback..." onchange="adImageComment(&quot;' + ad.id + '&quot;,&quot;image_comment&quot;,this.value)">' + esc(existing.image_comment || '') + '</textarea>' +
      '</div>' +
      '<div class="ad-review-copy-section">' +
        '<div class="ad-review-label">AD COPY</div>' +
        '<div class="ad-review-meta">' +
          '<span class="badge ' + (campColors[ad.campaign] || 'badge-gray') + '">' + esc(ad.campaign) + '</span>' +
          '<span class="ad-number">Ad #' + ad.id + '</span>' +
          (ad.hook_type ? '<span class="badge badge-gray">' + esc(ad.hook_type) + '</span>' : '') +
          '<div style="font-size:11px;color:#888;margin-top:4px">→ <a href="' + esc(destUrl) + '" target="_blank" style="color:var(--purple)">' + esc(ad.destination) + '</a></div>' +
        '</div>' +
        '<div class="ad-review-hook">' + esc(ad.hook) + '</div>' +
        '<div class="ad-review-body">' + esc(ad.body).substring(0, 300) + (ad.body.length > 300 ? '...' : '') + '</div>' +
        '<div class="review-actions">' +
          '<button class="review-btn review-btn-approve' + (existing.copy === 'approved' ? ' active' : '') + '" onclick="adImageDecide(&quot;' + ad.id + '&quot;,&quot;copy&quot;,&quot;approved&quot;)">Copy ✅</button>' +
          '<button class="review-btn review-btn-reject' + (existing.copy === 'rejected' ? ' active' : '') + '" onclick="adImageDecide(&quot;' + ad.id + '&quot;,&quot;copy&quot;,&quot;rejected&quot;)">Copy ❌</button>' +
        '</div>' +
        '<textarea class="review-comment" placeholder="Copy feedback..." onchange="adImageComment(&quot;' + ad.id + '&quot;,&quot;copy_comment&quot;,this.value)">' + esc(existing.copy_comment || '') + '</textarea>' +
      '</div>' +
    '</div>';
  });
  html += '</div>';

  document.getElementById('adImageReviewContent').innerHTML = html;
  updateAdImageReviewBadge();
}


function togglePromptOverlay(wrapEl) {
  const overlay = wrapEl.querySelector('.prompt-overlay');
  if (overlay) {
    overlay.classList.toggle('visible');
  }
}
function adImageDecide(id, field, decision) {
  if (!adImageReviewData[id]) adImageReviewData[id] = {};
  adImageReviewData[id][field] = decision;
  localStorage.setItem(AD_IMAGE_REVIEW_KEY, JSON.stringify(adImageReviewData));
  renderAdImageReview();
}


function adImageScore(id, field, value) {
  if (!adImageReviewData[id]) adImageReviewData[id] = {};
  adImageReviewData[id][field] = parseInt(value);
  localStorage.setItem(AD_IMAGE_REVIEW_KEY, JSON.stringify(adImageReviewData));
}
function adImageComment(id, field, comment) {
  if (!adImageReviewData[id]) adImageReviewData[id] = {};
  adImageReviewData[id][field] = comment;
  localStorage.setItem(AD_IMAGE_REVIEW_KEY, JSON.stringify(adImageReviewData));
}

function updateAdImageReviewBadge() {
  const remaining = DATA.ads.filter(a => { const d = adImageReviewData[a.id]; return !(d && d.image && d.copy); }).length;
  document.getElementById('navBadgeAdReview').textContent = remaining;
}


function submitAdReviews() {
  const statusEl = document.getElementById('submitStatus');
  
  // Build structured review data
  const reviews = DATA.ads.map(ad => {
    const d = adImageReviewData[ad.id] || {};
    return {
      ad_id: ad.id,
      filename: ad.image_url ? ad.image_url.split('/').pop() : null,
      campaign: ad.campaign,
      angle: ad.angle,
      hook_type: ad.hook_type,
      hook: ad.hook,
      body: ad.body,
      image_url: ad.image_url,
      image_decision: d.image || null,
      image_comment: d.image_comment || '',
      copy_decision: d.copy || null,
      copy_comment: d.copy_comment || '',
      scores: {
        realism: d.score_realism || null,
        scroll_stop: d.score_scroll_stop || null,
        emotion: d.score_emotion || null,
        ugc_quality: d.score_ugc || null
      },
      reviewed_at: new Date().toISOString()
    };
  });
  
  const avgScore = (field) => {
      const vals = reviews.map(r => r.scores[field]).filter(v => v !== null);
      return vals.length > 0 ? (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(1) : null;
    };
    const payload = {
    batch: 'mechanism-2026-03-18',
    submitted_at: new Date().toISOString(),
    total: reviews.length,
    approved_images: reviews.filter(r => r.image_decision === 'approved').length,
    rejected_images: reviews.filter(r => r.image_decision === 'rejected').length,
    avg_scores: {
      realism: avgScore('realism'),
      scroll_stop: avgScore('scroll_stop'),
      emotion: avgScore('emotion'),
      ugc_quality: avgScore('ugc_quality')
    },
    reviews: reviews
  };
  
  // Download JSON file
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ad-reviews-mechanism-' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
  
  statusEl.innerHTML = '✅ Reviews downloaded! Bot will auto-detect and process.';
}
